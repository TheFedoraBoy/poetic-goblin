{# Reusable pagination component #}
{% macro render_pagination(page, total_pages, endpoint, q='', username='') %}
{% if total_pages > 1 %}
<div class="pagination">
    {% if page > 1 %}
    <a href="{{ url_for(endpoint, page=page-1, q=q if q else None, username=username if username else None) }}" class="pagination-btn">← Prev</a>
    {% endif %}
    <span class="pagination-info">Page {{ page }} of {{ total_pages }}</span>
    {% if page < total_pages %}
    <a href="{{ url_for(endpoint, page=page+1, q=q if q else None, username=username if username else None) }}" class="pagination-btn">Next →</a>
    {% endif %}
</div>
{% endif %}
{% endmacro %}
