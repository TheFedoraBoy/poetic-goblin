{# Reusable Annals sidebar — directory of 8 ages #}
{% macro annals_sidebar(ages, active_age=None) %}
<aside class="annals-sidebar">
    <div class="annals-sidebar-card">
        <div class="annals-sidebar-title"><img class="px-icon" src="/static/icons/icon-book.svg" alt=""> The Eight Ages</div>
        {% for age in ages %}
        <a href="{{ url_for('annals_age', age_num=age.number) }}"
           class="annals-nav-item {% if active_age and active_age.number == age.number %}active{% endif %}">
            <span class="age-num">{{ age.number }}</span>
            {{ age.name }}
        </a>
        {% endfor %}
    </div>
    <div class="annals-sidebar-card">
        <div class="annals-sidebar-title"><img class="px-icon" src="/static/icons/icon-search.svg" alt=""> Search the Annals</div>
        <form action="{{ url_for('annals_search') }}" method="GET" style="display:flex;gap:0.4rem;">
            <input type="text" name="q" class="form-input" style="padding:0.4rem 0.7rem;font-size:0.85rem;" placeholder="Keywords...">
            <button type="submit" class="btn btn-primary btn-sm">Go</button>
        </form>
    </div>
</aside>
{% endmacro %}
