<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ code }} — Poetic Goblin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/svg+xml" href="/static/icons/goblin-mascot-sm.svg">
</head>
<body>
    <script>if(localStorage.getItem("pg-theme")==="dark")document.body.classList.add("dark-mode");</script>
    <div class="auth-page">
        <div class="auth-card" style="text-align:center;max-width:480px;">
            <div style="font-size:3.5rem;margin-bottom:0.5rem;">
                {% if code == 404 %}<img class="px-icon px-icon-hero" src="/static/icons/icon-compass.svg" alt="">{% elif code == 403 %}<img class="px-icon px-icon-hero" src="/static/icons/icon-elf.svg" alt="">{% elif code == 413 %}<img class="px-icon px-icon-hero" src="/static/icons/icon-book.svg" alt="">{% else %}<img class="px-icon px-icon-hero" src="/static/icons/icon-fire.svg" alt="">{% endif %}
            </div>
            <h1 style="font-family:var(--font-title);font-size:3rem;color:var(--orange);margin-bottom:0.3rem;">{{ code }}</h1>
            <h2 style="font-size:1.3rem;color:var(--blue-dark);margin-bottom:1rem;">{{ title }}</h2>
            <p style="color:var(--text-muted);line-height:1.6;margin-bottom:2rem;">{{ message }}</p>
            <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">
                <a href="{{ url_for('feed') }}" class="btn btn-primary"><img class="px-icon" src="/static/icons/icon-feed.svg" alt=""> Back to Feed</a>
                <a href="{{ url_for('index') }}" class="btn btn-ghost"><img class="px-icon" src="/static/icons/goblin-mascot-sm.svg" alt=""> Home</a>
            </div>
        </div>
    </div>
</body>
</html>
