{% extends "base.html" %}
{% block title %}Reset Password — Poetic Goblin{% endblock %}
{% block content %}
<div class="page-wrapper">
    <div class="auth-card">
        <h2>🔑 Reset Password</h2>
        <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem;">
            Choose a new password for your account.
        </p>
        <form method="POST" class="form-stack">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-input" placeholder="8+ chars, include a number" required minlength="8">
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-input" placeholder="Confirm" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Set New Password</button>
        </form>
        <div class="auth-links" style="margin-top:1rem;text-align:center;">
            <a href="{{ url_for('login') }}">← Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
